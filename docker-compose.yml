services:
  postgres:
    image: postgres:16
    container_name: finance-app-postgres
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: root
      POSTGRES_DB: financeapp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  postgres-test:
    image: postgres:16
    container_name: finance-app-postgres-test
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: root
      POSTGRES_DB: financeapp
    ports:
      - "5433:5432"
volumes:
  postgres-data:
